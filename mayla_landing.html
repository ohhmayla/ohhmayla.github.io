<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayla Duarte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0e0b14;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 20px 64px;
  font-family: "DM Sans", sans-serif;
}
.avatar {
  width: 114px; height: 114px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto 20px;
  border: 2px solid #9b7ec8;
  box-shadow: 0 0 24px rgba(155,126,200,0.25);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
h1 {
  font-family: "DM Serif Display", serif;
  font-size: 30px;
  color: #ede8f5;
  text-align: center;
  margin-bottom: 4px;
  font-weight: 400;
}
.handle {
  font-size: 13px;
  color: #9b7ec8;
  text-align: center;
  letter-spacing: 1.5px;
  margin-bottom: 22px;
}
.bio {
  font-size: 15px;
  color: #b8a8d4;
  text-align: center;
  line-height: 1.85;
  max-width: 290px;
  margin: 0 auto 26px;
  font-weight: 300;
}
.bio strong { color: #ede8f5; font-weight: 500; }
.tags {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 28px;
}
.tag {
  font-size: 12px; color: #c4aee8;
  background: #1e1628;
  border: 1px solid #3d2d5c;
  border-radius: 20px;
  padding: 4px 13px;
}
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  max-width: 310px;
  margin: 0 auto;
  padding: 16px 24px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  font-family: "DM Sans", sans-serif;
  background: #7b5ea7;
  color: #fff;
  border: none;
  box-shadow: 0 4px 20px rgba(123,94,167,0.4);
  transition: opacity 0.2s, transform 0.15s;
}
.btn:hover { opacity: 0.87; transform: translateY(-1px); }
.free-badge {
  background: rgba(255,255,255,0.15);
  color: #e8d8ff;
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  letter-spacing: 0.4px;
  white-space: nowrap;
}
.social-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin: 26px 0 0;
}
.social-link {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #1a1225;
  border: 1px solid #3d2d5c;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  transition: border-color 0.2s, background 0.2s;
}
.social-link:hover { border-color: #9b7ec8; background: #241838; }
.social-link svg { width: 18px; height: 18px; fill: #7b5ea7; transition: fill 0.2s; }
.social-link:hover svg { fill: #c4aee8; }
.divider { width: 36px; height: 1px; background: #2e2040; margin: 28px auto; }
.footer { font-size: 11px; color: #4a3860; text-align: center; letter-spacing: 0.4px; }
</style>
</head>
